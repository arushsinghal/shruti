services:
  - type: web
    name: lipi
    runtime: docker
    plan: starter
    region: singapore
    branch: master
    healthCheckPath: /api/health
    disk:
      name: lipi-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /app/data
      - key: SQLITE_DB
        value: /app/data/lipi.db
      - key: ASR_MODE
        value: cloud
      - key: SHRUTI_ADMIN_USER
        value: demo
      - key: SHRUTI_ADMIN_PASSWORD
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173,https://lipi.onrender.com"
