services:
  - type: web
    name: lipi
    runtime: docker
    plan: free
    region: singapore
    branch: master
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /tmp/lipi
      - key: SQLITE_DB
        value: sessions.db
      - key: ASR_MODE
        value: cloud
      - key: LIPI_ADMIN_USER
        value: demo
      - key: LIPI_ADMIN_PASSWORD
        sync: false
      - key: SARVAM_API_KEY
        sync: false
